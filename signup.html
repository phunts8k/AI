<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - AI Interview Prep</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <div class="logo">[ AI Interview Prep ]</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="signup.html" class="active">Sign Up</a>
    </nav>
  </header>

  <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 60px); margin: 0 auto; padding: 24px 20px;">

    <div style="width: 100%; max-width: 440px;">

    <section style="margin-bottom: 20px;">
      <h1>Create Account</h1>
      <p>Fill in the details below to register and start practising.</p>
    </section>

    <div class="card">

      <div class="msg error"   id="errorMsg"></div>
      <div class="msg success" id="successMsg">Account created! Redirecting to login...</div>

      <form id="signupForm">

        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 6 characters"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Repeat your password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
          Create Account
        </button>

      </form>

      <hr class="divider" />

      <p class="text-center" style="font-size: 13px;">
        Already have an account?
        <a href="login.html" style="color: var(--primary);">Login</a>
      </p>

    </div>
    </div>
  </main>

  <footer>
    <p>AI Interview Chatbot | Student Project</p>
  </footer>

  <script src="script.js"></script>

  <script>

    var signupForm  = document.getElementById("signupForm");
    var errorMsg    = document.getElementById("errorMsg");
    var successMsg  = document.getElementById("successMsg");

    signupForm.addEventListener("submit", function(event) {

      event.preventDefault();

      var name            = document.getElementById("name").value.trim();
      var email           = document.getElementById("email").value.trim();
      var password        = document.getElementById("password").value;
      var confirmPassword = document.getElementById("confirmPassword").value;

      errorMsg.style.display   = "none";
      successMsg.style.display = "none";

      if (name === "" || email === "" || password === "" || confirmPassword === "") {
        showError("All fields are required.");
        return;
      }

      if (!email.includes("@")) {
        showError("Please enter a valid email address.");
        return;
      }

      if (password.length < 6) {
        showError("Password must be at least 6 characters long.");
        return;
      }

      if (password !== confirmPassword) {
        showError("Passwords do not match.");
        return;
      }

      var newUser = {
        name:     name,
        email:    email,
        password: password
      };

      localStorage.setItem("registeredUser", JSON.stringify(newUser));

      localStorage.removeItem("loggedInUser");

      successMsg.style.display = "block";

      setTimeout(function() {
        window.location.href = "login.html";
      }, 1500);
    });

    function showError(message) {
      errorMsg.textContent   = message;
      errorMsg.style.display = "block";
    }
  </script>

</body>
</html>
